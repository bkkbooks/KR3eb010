body:
  text: 序一介之士苟存心濟物於物必有所濟雖蓬纍而行與得其時則駕者不可同年而語而其志則足尚矣幕賓袁子體庵顧影無儔居珠湖之濱喜讀書達通塞其才如五石之瓠不適於用然濟人利物之心未嘗去懷早年侍親疾博究方書深得異人授遂以天下之疲癃殘疾為己任視人之呻吟痛苦不啻若涉者之溺於淵呼號拯救而思欲手援之運籌韜略之暇醫門著述滿簏盈籝醫津一筏第其中一則耳每憾今之醫籍大半托拾前人牙慧割裂補竄攘為己有以博名高究之中無所得苟逞其臆見率意妄行惟其載肯及溺而已袁子之心傳則折衷諸家參以臨證經驗有疑似難明者發揮奧蘊隨筆記録以待質正豫嘉其闡古今所必由之理實天下所未見之書俾後進者引而伸之平時得之於心臨症應之於手裨益蒼生非淺鮮也於戎馬倥傯之際抽間閲勘俟鋒焰稍息亟付手民以餉世之習醫者苟研求而有得焉將免殺人之惡名而為生人之仁術豈不懿歟時在崇禎歲次癸未仲秋月兵部使者溧陽史可法識
